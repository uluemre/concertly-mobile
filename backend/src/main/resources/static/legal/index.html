<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Concertly — Yasal / Legal</title>
  <style>
    :root { --accent: #E94560; --bg: #0f1117; --card: #181b23; --text: #e7e9ee; --muted: #9aa0ad; --border: #262a33; }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6; display: flex; min-height: 100vh; align-items: center; justify-content: center; padding: 24px; }
    .card { max-width: 460px; width: 100%; text-align: center; }
    h1 { font-size: 1.6rem; margin: 0 0 4px; }
    h1 .dot { color: var(--accent); }
    p { color: var(--muted); margin: 0 0 28px; }
    .links { display: grid; gap: 12px; }
    a.btn { display: block; padding: 16px; background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; color: var(--text); text-decoration: none; font-weight: 600; transition: border-color .15s; }
    a.btn:hover { border-color: var(--accent); }
    a.btn span { display: block; color: var(--muted); font-weight: 400; font-size: .85rem; margin-top: 2px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Concertly <span class="dot">·</span> Yasal / Legal</h1>
    <p>Gizlilik politikamız ve kullanım şartlarımız / Our privacy policy and terms of service</p>
    <div class="links">
      <a class="btn" href="/legal/privacy.html">Gizlilik Politikası<span>Privacy Policy</span></a>
      <a class="btn" href="/legal/terms.html">Kullanım Şartları<span>Terms of Service</span></a>
    </div>
  </div>
</body>
</html>
