# Concertly backend yapılandırması
# -----------------------------------------------------------------------------
# Bu dosya commit EDİLİR ama içinde GERÇEK secret YOKTUR.
# Tüm hassas değerler ${ENV_DEGISKENI:güvenli-default} biçiminde okunur:
#   - Production (Railway): env değişkenleri (DB_URL, JWT_SECRET, ... ) devreye girer.
#   - Yerel geliştirme: aşağıdaki default'lar kullanılır (gerçek API anahtarların
#     için yerelde env değişkeni ver ya da gitignore'lu application-local.properties kullan).
# -----------------------------------------------------------------------------

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/concertly_mobile}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:1234}

# Prod'da Flyway/Liquibase + DDL_AUTO=validate önerilir (lokal: update)
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
server.port=${PORT:8082}

# Görsel yükleme
app.upload.dir=${UPLOAD_DIR:uploads}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# JWT — prod'da JWT_SECRET env ile GÜÇLÜ bir secret ver.
# Aşağıdaki default SADECE yerel geliştirme içindir, prod'da kullanma.
jwt.secret=${JWT_SECRET:dev-local-only-secret-do-not-use-in-production-0123456789abcdef}
jwt.expiration.ms=${JWT_EXPIRATION_MS:3600000}
jwt.refresh.expiration.days=${JWT_REFRESH_EXPIRATION_DAYS:30}

# Spotify — anahtarları env ile ver (boş bırakılırsa Spotify zenginleştirme çalışmaz, uygulama yine açılır)
spotify.client.id=${SPOTIFY_CLIENT_ID:}
spotify.client.secret=${SPOTIFY_CLIENT_SECRET:}
spotify.redirect.uri=${SPOTIFY_REDIRECT_URI:http://localhost:8082/api/spotify/callback}

# Ticketmaster — anahtarı env ile ver (boş bırakılırsa otomatik etkinlik çekme çalışmaz)
ticketmaster.api.key=${TICKETMASTER_API_KEY:}

# Admin bootstrap — bu e-postaya sahip kullanıcı açılışta ROLE_ADMIN yapılır
# (taze DB'de ilk admin'i oluşturmak için; boş bırakılırsa devre dışı)
admin.bootstrap.email=${ADMIN_EMAIL:}
